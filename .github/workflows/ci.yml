name: Python 3.15 Data Engineering Validation CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate Python 3.15 readiness lab
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python 3.15 preview
        run: |
          uv python install 3.15.0b2

      - name: Create virtual environment
        run: |
          uv venv --python 3.15.0b2 .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install pytest

      - name: Show environment
        run: |
          . .venv/bin/activate
          python --version
          python -c "import sys; print(sys.executable)"
          python -m pytest --version

      - name: Compile project scripts and tests
        run: |
          . .venv/bin/activate
          python -m py_compile \
            sync_readiness.py \
            tools/sync_readiness.py \
            tests/test_release_progression.py \
            tests/test_manifest_schema.py \
            tests/test_readiness_consistency.py \
            tests/test_sync_readiness.py \
            tests/test_generate_report_artifacts.py

      - name: Run test suite
        run: |
          . .venv/bin/activate
          python -m pytest -q

      - name: Verify release checksums
        run: |
          cd releases
          shasum -a 256 -c python315-dataeng-validation-v1.8.0.zip.sha256
          shasum -a 256 -c python315-dataeng-validation-v1.8.1.zip.sha256
